# prompt-injection.conf
# Custom prompt injection patterns for fci-crawl
# One regex pattern per line. Lines starting with # are comments.
# Patterns are matched case-insensitively.
#
# Built-in patterns already cover:
# - ignore/disregard/forget previous instructions
# - role override (you are now...)
# - system prompt delimiters ([INST], <<SYS>>, etc.)
# - jailbreak vocabulary (DAN, developer mode, bypass safety, etc.)
# - invisible Unicode characters
# - data exfiltration prompts (print your system prompt, etc.)
#
# Add site-specific or project-specific patterns below:

# Example: block attempts to get the model to output its context
# print.*context.*window
# show.*training.*data
